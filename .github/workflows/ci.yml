name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint and test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"

      - name: Run ruff
        run: python -m ruff check src tests

      - name: Run mypy
        run: python -m mypy src

      - name: Run tests
        run: python -m pytest --cov=visionlabelops --cov-report=term-missing --cov-fail-under=92

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip setuptools wheel && python -m pip install ".[dev]"

      - name: Validate build
        run: python -m build --no-isolation

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Smoke test built artifact
        run: python -m visionlabelops stats --input examples/data/labelme-mini --format labelme --output tmp/ci-stats --overwrite

  windows-cli-smoke:
    name: Windows CLI smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Smoke test CLI
        run: python -m visionlabelops stats --input examples/data/labelme-mini --format labelme --output tmp/ci-stats --overwrite

  macos-cli-smoke:
    name: macOS CLI smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Smoke test CLI
        run: python -m visionlabelops stats --input examples/data/labelme-mini --format labelme --output tmp/ci-stats --overwrite
